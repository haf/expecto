name: Release

on:
  push:
    tags:
      - "*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup .Net
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: "./global.json"
      - run: ./fake --target Release
        env:
          NUGET_TOKEN: ${{secrets.NUGET_RELEASE_KEY}}
